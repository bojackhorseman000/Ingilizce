<title>Kelime KartlarДұ В· IPA + Ses + Test + Arama В· Tap Fix</title>
<style>
:root{
  --bg:#111724; --bg2:#1b2434; --card:#263145; --card2:#202a3b;
  --text:#f5efe7; --muted:#b3adba; --line:rgba(255,255,255,.11);
  --good:#aee6ca; --bad:#efa9a3; --accent:#f0d99c; --panel:rgba(255,255,255,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:
  radial-gradient(820px 620px at 15% -10%,rgba(174,230,202,.14),transparent 60%),
  radial-gradient(760px 540px at 105% 0%,rgba(240,217,156,.12),transparent 58%),
  linear-gradient(160deg,var(--bg2),var(--bg));color:var(--text);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none}
button,select{font:inherit;color:inherit}
button{border:0;cursor:pointer}
.app{height:100dvh;max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 12px);display:flex;flex-direction:column;gap:12px}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex:0 0 auto}
.title{min-width:0}.title h1{margin:0;font-size:clamp(26px,7vw,38px);letter-spacing:-.055em;line-height:.92;font-weight:1000}.title p{margin:6px 0 0;color:var(--muted);font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconBtn{width:48px;height:48px;flex:0 0 auto;border-radius:18px;background:var(--panel);border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.06);font-weight:1000;font-size:24px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:11px;backdrop-filter:blur(14px);flex:0 0 auto}
.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
select{width:100%;min-width:0;appearance:none;border:1px solid var(--line);background:rgba(0,0,0,.16);border-radius:17px;padding:12px 14px;outline:none;font-weight:900}
.badge{height:44px;border-radius:17px;padding:0 13px;display:flex;align-items:center;justify-content:center;background:rgba(234,214,165,.13);color:var(--accent);border:1px solid rgba(234,214,165,.18);font-weight:1000;white-space:nowrap}
.path{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:9px 1px 2px}.path::-webkit-scrollbar{display:none}
.chip{border:1px solid var(--line);background:rgba(255,255,255,.055);color:var(--muted);border-radius:999px;padding:8px 10px;font-size:12px;font-weight:900;white-space:nowrap}.chip.on{background:rgba(243,238,232,.92);color:#151a25;border-color:transparent}
.stats{display:flex;justify-content:space-between;gap:10px;margin-top:9px;color:var(--muted);font-size:12px;font-weight:900}.stats b{color:var(--text)}
.bar{height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:9px}.bar i{display:block;height:100%;width:0%;border-radius:inherit;background:linear-gradient(90deg,var(--good),var(--accent));transition:width .22s ease}
.primary{width:100%;margin-top:9px;border-radius:17px;padding:13px 12px;background:linear-gradient(135deg,rgba(169,222,192,.20),rgba(234,214,165,.18));border:1px solid rgba(255,255,255,.10);font-weight:1000}.primary:disabled{opacity:.4;filter:grayscale(.8)}.quickBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.quickBtns .primary{margin-top:0}.primary.secondary{background:rgba(255,255,255,.065)}
.stage{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px 0 8px}
.card{position:relative;width:min(100%,440px);height:min(58vh,500px);min-height:330px;perspective:1200px;touch-action:none}.card.drag{transition:none!important}.inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .22s cubic-bezier(.2,.8,.2,1)}.inner.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:34px;background:linear-gradient(150deg,var(--card),var(--card2));border:1px solid rgba(255,255,255,.10);box-shadow:0 26px 70px rgba(0,0,0,.34),0 1px 0 rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.07);backface-visibility:hidden;display:flex;flex-direction:column;padding:24px;overflow:hidden}.back{transform:rotateY(180deg);background:linear-gradient(150deg,#252c3b,#202838)}
.meta{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px;font-weight:900}.frontCenter,.meaning{margin:auto 0;text-align:center;overflow-wrap:anywhere}.word{font-size:clamp(43px,12vw,76px);line-height:.92;font-weight:1000;letter-spacing:-.07em}.ipa{margin-top:14px;font-size:clamp(17px,4.5vw,25px);line-height:1.25;font-weight:850;letter-spacing:.01em;color:rgba(245,239,231,.70);font-family:ui-serif,Georgia,'Times New Roman',serif}.meaning{font-size:clamp(25px,7vw,40px);line-height:1.13;font-weight:950;letter-spacing:-.04em;color:#fff3e4}.hint{text-align:center;color:rgba(243,238,232,.54);font-size:12px;font-weight:850}.hint b{color:rgba(243,238,232,.78)}
.label{position:absolute;top:45%;z-index:5;opacity:0;pointer-events:none;border-radius:999px;padding:12px 15px;font-size:13px;font-weight:1000;letter-spacing:.04em;transition:opacity .08s}.left{left:14px;background:rgba(231,166,160,.17);color:var(--bad);border:1px solid rgba(231,166,160,.34)}.right{right:14px;background:rgba(169,222,192,.17);color:var(--good);border:1px solid rgba(169,222,192,.34)}
.empty{display:none;text-align:center;width:100%;max-width:440px;padding:28px 22px;border:1px dashed var(--line);border-radius:28px;background:rgba(255,255,255,.035)}.empty.show{display:block}.empty h2{margin:0 0 8px;font-size:25px;letter-spacing:-.04em}.empty p{margin:0;color:var(--muted);font-weight:800;line-height:1.35}
.sheet{position:fixed;inset:auto 0 0 0;z-index:20;display:none}.sheet.show{display:block}.shade{position:fixed;inset:0;background:rgba(0,0,0,.35)}.sheetBox{position:relative;max-width:560px;margin:0 auto;background:#1c2432;border:1px solid var(--line);border-radius:30px 30px 0 0;padding:16px 16px calc(env(safe-area-inset-bottom) + 16px);box-shadow:0 -24px 90px rgba(0,0,0,.45)}.sheetTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.sheetTop b{font-size:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.act{min-height:48px;border-radius:16px;background:rgba(255,255,255,.065);border:1px solid var(--line);font-weight:900}.act.full{grid-column:1/-1}.act.danger{color:#ffd2ce;background:rgba(231,166,160,.09)}.act:disabled{opacity:.35}.toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 18px);transform:translateX(-50%) translateY(18px);opacity:0;z-index:40;background:rgba(0,0,0,.72);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:12px 16px;font-weight:900;transition:.18s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-height:690px){.app{gap:8px;padding-top:10px}.panel{padding:9px}.card{height:50vh;min-height:270px}.face{padding:19px;border-radius:28px}.path{padding-top:7px}.primary{padding:11px}.title h1{font-size:28px}.title p{font-size:12px}}

.soundBtn{margin:18px auto 0;width:58px;height:44px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.06);font-size:21px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.soundBtn:active{transform:scale(.96)}
.modeOn{background:linear-gradient(135deg,rgba(174,230,202,.28),rgba(240,217,156,.18))!important;color:var(--text)}
.testPanel{display:none;width:min(100%,440px);height:auto;max-height:calc(var(--vvh,100dvh) - 164px);min-height:min(330px,calc(var(--vvh,100dvh) - 164px));border-radius:34px;background:linear-gradient(150deg,var(--card),var(--card2));border:1px solid rgba(255,255,255,.10);box-shadow:0 26px 70px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.07);padding:24px;flex-direction:column;justify-content:space-between;gap:14px;overflow:auto;overscroll-behavior:contain}.testPanel.show{display:flex}.testPanel.revealed{border-color:rgba(240,217,156,.30)}.testTop{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px;font-weight:900;flex:0 0 auto}.testMeaning{font-size:clamp(22px,6.5vw,36px);line-height:1.14;font-weight:950;letter-spacing:-.04em;text-align:center;color:#fff3e4;margin:auto 0;overflow-wrap:anywhere;min-height:0}.testWork{display:flex;flex-direction:column;gap:10px;flex:0 0 auto}.testInput{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.20);border-radius:20px;padding:15px 17px;font-size:22px;font-weight:950;color:var(--text);outline:none;text-align:center;text-transform:uppercase;flex:0 0 auto}.testInput:focus{border-color:rgba(240,217,156,.45);box-shadow:0 0 0 4px rgba(240,217,156,.08)}.testBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:0 0 auto}.testAnswer{min-height:46px;text-align:center;font-weight:900;color:var(--muted);line-height:1.25;flex:0 0 auto}.testAnswer b{color:var(--text);font-size:20px}.testAnswer .realMeaning{display:block;margin-top:7px;color:#fff3e4;font-size:14px;font-weight:850;line-height:1.28}.testSubmitNext{background:linear-gradient(135deg,rgba(240,217,156,.30),rgba(174,230,202,.22))!important;color:var(--text)}.testBtns button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}.testWork{scroll-margin-bottom:14px}body.typing .panel,body.typing .path{display:none}body.typing .app{gap:8px;padding-top:calc(env(safe-area-inset-top) + 8px)}body.typing .stage{align-items:flex-start;padding-top:4px}body.typing .testPanel{max-height:calc(var(--vvh,100dvh) - 98px);min-height:0}.searchOverlay{position:fixed;inset:0;background:rgba(6,9,14,.58);backdrop-filter:blur(14px);z-index:40;display:none;padding:calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 14px)}.searchOverlay.show{display:flex}.searchBox{width:min(100%,560px);max-height:100%;margin:auto;background:linear-gradient(150deg,#202939,#151d2a);border:1px solid var(--line);border-radius:28px;padding:14px;box-shadow:0 30px 80px rgba(0,0,0,.45);display:flex;flex-direction:column;gap:10px}.searchTop{display:flex;align-items:center;justify-content:space-between;gap:10px}.searchTop b{font-size:18px}.searchInput{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:18px;padding:14px 15px;font-weight:900;color:var(--text);outline:none}.searchInfo{color:var(--muted);font-size:12px;font-weight:850;padding:0 4px}.searchResults{overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:2px}.res{border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.05);border-radius:18px;padding:12px;text-align:left}.resHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px}.resWord{font-size:20px;font-weight:1000;letter-spacing:-.03em}.resIpa{color:rgba(245,239,231,.66);font-size:13px;font-family:ui-serif,Georgia,'Times New Roman',serif}.resMeaning{margin-top:5px;color:#fff3e4;font-weight:800;line-height:1.25}.resSrc{margin-top:6px;color:var(--muted);font-size:11px;font-weight:900}
@media(max-height:690px){.testPanel{max-height:calc(var(--vvh,100dvh) - 112px);min-height:0;padding:19px;border-radius:28px}.soundBtn{margin-top:12px;height:40px}.testInput{padding:12px;font-size:19px}.testMeaning{font-size:clamp(20px,6vw,30px)}}

</style>
</head>
