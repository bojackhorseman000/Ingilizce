name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Projeyi hazırla
        run: |
          mkdir -p www
          cp index.html www/index.html

          printf '%s\n' \
          '{' \
          '  "name": "kelime-kartlari",' \
          '  "version": "1.0.0",' \
          '  "private": true,' \
          '  "dependencies": {' \
          '    "@capacitor/core": "6.1.2",' \
          '    "@capacitor/android": "6.1.2"' \
          '  },' \
          '  "devDependencies": {' \
          '    "@capacitor/cli": "6.1.2"' \
          '  }' \
          '}' > package.json

          printf '%s\n' \
          '{' \
          '  "appId": "com.mete.kelimekartlari",' \
         
