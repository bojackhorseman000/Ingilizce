name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Capacitor projesini hazırla
        run: |
          mkdir -p www
          cp index.html www/index.html

          cat > package.json <<'EOF'
          {
            "name": "kelime-kartlari",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "6.1.2",
              "@capacitor/android": "6.1.2"
            },
            "devDependencies": {
              "@capacitor/cli": "6.1.2"
            }
          }
          EOF

          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.mete.kelimekartlari",
            "appName": "Kelime Kartlari",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

      - name: Paketleri kur
        run: npm install

      - name: Android projesi oluştur
        run: npx cap add android

      - name: Native Android TTS köprüsü ekle
        run: |
          cat > android/app/src/main/java/com/mete/kelimekartlari/MainActivity.java <<'EOF'
          package com.mete.kelimekartlari;

          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.webkit.JavascriptInterface;
          import com.getcapacitor.BridgeActivity;
          import java.util.Locale;

          public class MainActivity extends BridgeActivity {
              private TextToSpeech tts;

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS && tts != null) {
                          tts.setLanguage(Locale.US);
                          tts.setSpeechRate(0.92f);
                      }
                  });

                  if (this.bridge != null && this.bridge.getWebView() != null) {
                      this.bridge.getWebView().addJavascriptInterface(new AndroidTTSBridge(), "AndroidTTS");
                  }
              }

              public class AndroidTTSBridge {
                  @JavascriptInterface
                  public void speak(String text) {
                      if (text == null) return;
                      runOnUiThread(() -> {
                          if (tts != null) {
                              tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "kelimeKartlariTTS");
                          }
                      });
                  }
              }

              @Override
              public void onDestroy() {
                  if (tts != null) {
                      tts.stop();
                      tts.shutdown();
                  }
                  super.onDestroy();
              }
          }
          EOF

      - name: Android dosyalarını kopyala
        run: npx cap copy android

      - name: APK oluştur
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: kelime-kartlari-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
