name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Capacitor projesini hazırla
        run: |
          test -f index.html
          rm -rf www android package.json package-lock.json capacitor.config.json node_modules
          mkdir -p www
          cp index.html www/index.html

          cat > package.json <<'EOF_PACKAGE'
          {
            "name": "kelime-kartlari-jsfix",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "6.1.2",
              "@capacitor/android": "6.1.2"
            },
            "devDependencies": {
              "@capacitor/cli": "6.1.2"
            }
          }
          EOF_PACKAGE

          cat > capacitor.config.json <<'EOF_CONFIG'
          {
            "appId": "com.mete.kelimekartlarijsfix",
            "appName": "Kelime Kartlari Fix",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https"
            }
          }
          EOF_CONFIG

      - name: Paketleri kur
        run: npm install

      - name: Android projesi oluştur
        run: npx cap add android

      - name: Native Android TTS köprüsü ekle
        run: |
          PKG_DIR="android/app/src/main/java/com/mete/kelimekartlarijsfix"
          mkdir -p "$PKG_DIR"

          cat > "$PKG_DIR/MainActivity.java" <<'EOF_JAVA'
          package com.mete.kelimekartlarijsfix;

          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.webkit.JavascriptInterface;
          import com.getcapacitor.BridgeActivity;
          import java.util.Locale;

          public class MainActivity extends BridgeActivity {
              private TextToSpeech tts;

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      tts = new TextToSpeech(this, status -> {
                          try {
                              if (status == TextToSpeech.SUCCESS && tts != null) {
                                  tts.setLanguage(Locale.US);
                                  tts.setSpeechRate(0.9f);
                                  tts.setPitch(1.0f);
                              }
                          } catch (Exception ignored) {}
                      });
                      getBridge().getWebView().addJavascriptInterface(new AndroidTTSBridge(), "AndroidTTS");
                  } catch (Exception ignored) {}
              }

              public class AndroidTTSBridge {
                  @JavascriptInterface
                  public void speak(final String text) {
                      runOnUiThread(() -> {
                          try {
                              if (tts != null && text != null && text.trim().length() > 0) {
                                  tts.stop();
                                  tts.speak(text.trim(), TextToSpeech.QUEUE_FLUSH, null, "tts_" + System.currentTimeMillis());
                              }
                          } catch (Exception ignored) {}
                      });
                  }
              }

              @Override
              public void onDestroy() {
                  try {
                      if (tts != null) {
                          tts.stop();
                          tts.shutdown();
                      }
                  } catch (Exception ignored) {}
                  super.onDestroy();
              }
          }
          EOF_JAVA

          echo "MainActivity oluşturuldu:"
          find android/app/src/main/java -name MainActivity.java -print

      - name: Android dosyalarını kopyala
        run: npx cap copy android

      - name: APK oluştur
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: kelime-kartlari-apk-jsfix-v2
          path: android/app/build/outputs/apk/debug/app-debug.apk
