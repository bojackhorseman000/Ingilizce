name: Kokten Temiz APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu al
        uses: actions/checkout@v4

      - name: Dosyalari kontrol et
        run: |
          pwd
          ls -la
          test -f index.html

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Temiz Capacitor projesi hazirla
        run: |
          set -e
          rm -rf www android node_modules package.json package-lock.json capacitor.config.json
          mkdir -p www
          cp index.html www/index.html

          cat > package.json <<'JSON'
          {
            "name": "kelime-kartlari-kokten-temiz",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "6.1.2",
              "@capacitor/android": "6.1.2"
            },
            "devDependencies": {
              "@capacitor/cli": "6.1.2"
            }
          }
          JSON

          cat > capacitor.config.json <<'JSON'
          {
            "appId": "com.mete.kelimekartlarikoktentemiz",
            "appName": "Kelime Kartlari",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https"
            }
          }
          JSON

      - name: Paketleri kur
        run: npm install

      - name: Android projesi olustur
        run: npx cap add android

      - name: Web dosyalarini Android'e kopyala
        run: npx cap copy android

      - name: APK olustur
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: kelime-kartlari-kokten-temiz-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
