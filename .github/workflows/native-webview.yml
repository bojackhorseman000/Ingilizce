name: Native WebView TTS Memory APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build native WebView APK with TTS
        run: |
          set -eux
          test -f index.html
          rm -rf native-apk
          mkdir -p native-apk/app/src/main/java/com/mete/kelimekartlari/nativewebtts
          mkdir -p native-apk/app/src/main/assets
          cp index.html native-apk/app/src/main/assets/index.html
          cat > native-apk/app/kelime-debug.keystore.b64 <<'KEYSTORE'
          
          KEYSTORE
          base64 -d native-apk/app/kelime-debug.keystore.b64 > native-apk/app/kelime-debug.keystore
          rm native-apk/app/kelime-debug.keystore.b64

          cat > native-apk/settings.gradle <<'EOF2'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'KelimeKartlariNativeTTS'
          include ':app'
          EOF2

          cat > native-apk/build.gradle <<'EOF2'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF2

          cat > native-apk/app/build.gradle <<'EOF2'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.mete.kelimekartlari.nativewebtts'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.mete.kelimekartlari.nativewebtts'
                  minSdk 23
                  targetSdk 35
                  versionCode Integer.parseInt(System.getenv("GITHUB_RUN_NUMBER") ?: "2")
                  versionName "1.1-memory-${System.getenv('GITHUB_RUN_NUMBER') ?: '2'}"
              }

              signingConfigs {
                  debug {
                      storeFile file('kelime-debug.keystore')
                      storePassword 'kelime123'
                      keyAlias 'kelime'
                      keyPassword 'kelime123'
                  }
              }

              buildTypes {
                  debug {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF2

          cat > native-apk/app/src/main/AndroidManifest.xml <<'EOF2'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:theme="@style/AppTheme"
                  android:label="Kelime Kartları"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true"
                  android:resizeableActivity="true">
                  <activity
                      android:name=".MainActivity"
                      android:screenOrientation="portrait"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF2

          mkdir -p native-apk/app/src/main/res/values
          cat > native-apk/app/src/main/res/values/styles.xml <<'EOF2'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#f0d99c</item>
                  <item name="android:navigationBarColor">#111724</item>
                  <item name="android:statusBarColor">#111724</item>
              </style>
          </resources>
          EOF2

          cat > native-apk/app/src/main/java/com/mete/kelimekartlari/nativewebtts/MainActivity.java <<'EOF2'
          package com.mete.kelimekartlari.nativewebtts;

          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.view.MotionEvent;
          import android.view.View;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private WebView webView;
              private TextToSpeech tts;
              private boolean ttsReady = false;
              private String pendingSpeak = null;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) {
                          int result = tts.setLanguage(Locale.US);
                          ttsReady = result != TextToSpeech.LANG_MISSING_DATA && result != TextToSpeech.LANG_NOT_SUPPORTED;
                          tts.setSpeechRate(0.88f);
                          tts.setPitch(1.0f);
                          if (ttsReady && pendingSpeak != null) {
                              speakNative(pendingSpeak);
                              pendingSpeak = null;
                          }
                      }
                  });

                  webView = new WebView(this);
                  webView.setFocusable(true);
                  webView.setFocusableInTouchMode(true);
                  webView.requestFocusFromTouch();

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);

                  webView.addJavascriptInterface(new AndroidTTSBridge(), "AndroidTTS");
                  webView.addJavascriptInterface(new AndroidStoreBridge(), "AndroidStore");
                  webView.setWebViewClient(new WebViewClient());
                  webView.setOnTouchListener(new View.OnTouchListener() {
                      @Override
                      public boolean onTouch(View v, MotionEvent event) {
                          v.requestFocusFromTouch();
                          return false;
                      }
                  });

                  setContentView(webView);
                  webView.loadUrl("file:///android_asset/index.html");
              }

              private void speakNative(String text) {
                  if (text == null) return;
                  String clean = text.trim();
                  if (clean.length() == 0 || tts == null) return;

                  if (!ttsReady) {
                      pendingSpeak = clean;
                      return;
                  }

                  tts.stop();
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      tts.speak(clean, TextToSpeech.QUEUE_FLUSH, null, "kelime_" + System.currentTimeMillis());
                  } else {
                      tts.speak(clean, TextToSpeech.QUEUE_FLUSH, null);
                  }
              }

              public class AndroidTTSBridge {
                  @JavascriptInterface
                  public void speak(String text) {
                      runOnUiThread(() -> speakNative(text));
                  }

                  @JavascriptInterface
                  public boolean isReady() {
                      return ttsReady;
                  }
              }

              public class AndroidStoreBridge {
                  private final SharedPreferences prefs = getSharedPreferences("kelime_kartlari_progress", MODE_PRIVATE);

                  @JavascriptInterface
                  public String getItem(String key) {
                      if (key == null) return "__KK_NULL__";
                      String value = prefs.getString(key, null);
                      return value == null ? "__KK_NULL__" : value;
                  }

                  @JavascriptInterface
                  public void setItem(String key, String value) {
                      if (key == null) return;
                      prefs.edit().putString(key, value == null ? "" : value).commit();
                  }

                  @JavascriptInterface
                  public void removeItem(String key) {
                      if (key == null) return;
                      prefs.edit().remove(key).commit();
                  }
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) {
                      tts.stop();
                      tts.shutdown();
                  }
                  if (webView != null) {
                      webView.destroy();
                  }
                  super.onDestroy();
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF2

          cd native-apk
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kelime-kartlari-native-webview-tts-memory-apk
          path: native-apk/app/build/outputs/apk/debug/app-debug.apk
