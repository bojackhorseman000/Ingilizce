name: Native WebView Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Android WebView APK
        run: |
          test -f index.html

          rm -rf native-apk
          mkdir -p native-apk/app/src/main/java/com/mete/kelimekartlari
          mkdir -p native-apk/app/src/main/assets

          cp index.html native-apk/app/src/main/assets/index.html

          cat > native-apk/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'KelimeKartlari'
          include ':app'
          EOF

          cat > native-apk/build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF

          cat > native-apk/app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.mete.kelimekartlari'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.mete.kelimekartlari'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          cat > native-apk/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:theme="@style/AppTheme"
                  android:label="Kelime Kartları"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          mkdir -p native-apk/app/src/main/res/values
          cat > native-apk/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:fontFamily">sans</item>
                  <item name="android:colorAccent">#f0d99c</item>
              </style>
          </resources>
          EOF

          cat > native-apk/app/src/main/java/com/mete/kelimekartlari/MainActivity.java <<'EOF'
          package com.mete.kelimekartlari;

          import android.app.Activity;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private WebView webView;
              private TextToSpeech tts;

              public class AndroidTTS {
                  @JavascriptInterface
                  public void speak(final String text) {
                      runOnUiThread(new Runnable() {
                          @Override public void run() {
                              if (tts != null && text != null) {
                                  tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "word");
                              }
                          }
                      });
                  }
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  webView = new WebView(this);
                  setContentView(webView);

                  tts = new TextToSpeech(this, new TextToSpeech.OnInitListener() {
                      @Override public void onInit(int status) {
                          if (status == TextToSpeech.SUCCESS) {
                              tts.setLanguage(Locale.US);
                              tts.setSpeechRate(0.88f);
                          }
                      }
                  });

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);

                  webView.addJavascriptInterface(new AndroidTTS(), "AndroidTTS");
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) {
                      tts.stop();
                      tts.shutdown();
                  }
                  if (webView != null) {
                      webView.destroy();
                  }
                  super.onDestroy();
              }
          }
          EOF

          cd native-apk
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kelime-kartlari-apk
          path: native-apk/app/build/outputs/apk/debug/app-debug.apk
