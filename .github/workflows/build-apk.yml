name: Build Android APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo dosyalarını al
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android paketlerini kur
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: ZIP'i çıkar
        run: |
          mkdir project
          unzip -q FosforQuizGithubReady.zip -d project
          ls -la project

      - name: APK oluştur
        run: |
          cd project
          gradle --no-daemon assembleDebug

      - name: APK'yı yüklenebilir dosya olarak koy
        uses: actions/upload-artifact@v4
        with:
          name: FosforQuiz-debug-apk
          path: project/app/build/outputs/apk/debug/app-debug.apk
