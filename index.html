<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Kelime Kartları · Android Temiz</title>
<style>
:root {
  --vh: 1vh;
  --bg:#111724; --bg2:#1b2434; --card:#263145; --card2:#202a3b;
  --text:#f5efe7; --muted:#b3adba; --line:rgba(255,255,255,.12);
  --good:#aee6ca; --bad:#efa9a3; --accent:#f0d99c; --panel:rgba(255,255,255,.07);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body {
  margin:0; width:100%; height:100%; overflow:hidden;
  background:linear-gradient(160deg,var(--bg2),var(--bg)); color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  user-select:none; -webkit-user-select:none;
}
button,select,input { font:inherit; color:inherit; }
button { border:0; cursor:pointer; touch-action:manipulation; }
.app {
  height:calc(var(--vh) * 100);
  max-width:560px; margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 10px) 14px calc(env(safe-area-inset-bottom) + 10px);
  display:flex; flex-direction:column; gap:10px; overflow:hidden;
}
.top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; flex:0 0 auto; }
.title h1 { margin:0; font-size:clamp(28px,8vw,40px); letter-spacing:-.06em; line-height:.9; font-weight:1000; }
.title p { margin:6px 0 0; color:var(--muted); font-size:12px; font-weight:850; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:78vw; }
.iconBtn {
  width:46px; height:46px; flex:0 0 auto; border-radius:17px; background:var(--panel);
  border:1px solid var(--line); font-size:24px; font-weight:1000;
}
.panel { flex:0 0 auto; background:var(--panel); border:1px solid var(--line); border-radius:22px; padding:10px; }
.row { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
select,input {
  width:100%; min-width:0; border:1px solid var(--line); background:rgba(0,0,0,.18);
  border-radius:16px; padding:11px 13px; outline:0; font-weight:900;
}
.badge {
  height:42px; border-radius:16px; padding:0 12px; display:flex; align-items:center; justify-content:center;
  background:rgba(240,217,156,.13); color:var(--accent); border:1px solid rgba(240,217,156,.22);
  font-weight:1000; white-space:nowrap; font-size:13px;
}
.stats { display:flex; justify-content:space-between; gap:10px; margin-top:8px; color:var(--muted); font-size:12px; font-weight:900; }
.stats b { color:var(--text); }
.bar { height:7px; border-radius:99px; background:rgba(255,255,255,.08); overflow:hidden; margin-top:8px; }
.bar i { display:block; height:100%; width:0%; border-radius:inherit; background:linear-gradient(90deg,var(--good),var(--accent)); transition:width .18s ease; }
.quick { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.btn {
  border-radius:16px; min-height:42px; padding:10px 11px; background:rgba(255,255,255,.075);
  border:1px solid var(--line); font-weight:1000; font-size:14px;
}
.btn.primary { background:linear-gradient(135deg,rgba(174,230,202,.20),rgba(240,217,156,.16)); }
.btn.bad { background:rgba(239,169,163,.14); }
.btn.good { background:rgba(174,230,202,.15); }
.stage { flex:1 1 auto; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; overflow:hidden; }
.card {
  width:min(100%,440px); flex:1 1 auto; min-height:230px; max-height:500px;
  border-radius:30px; background:linear-gradient(150deg,var(--card),var(--card2));
  border:1px solid rgba(255,255,255,.10); box-shadow:0 18px 55px rgba(0,0,0,.32);
  display:flex; flex-direction:column; padding:20px; text-align:center; position:relative; overflow:hidden;
  touch-action:none;
}
.card.shake { animation:shake .18s linear 1; }
@keyframes shake { 0%,100%{transform:translateX(0)} 30%{transform:translateX(-5px)} 70%{transform:translateX(5px)} }
.meta { display:flex; justify-content:space-between; gap:12px; color:var(--muted); font-size:12px; font-weight:900; flex:0 0 auto; }
.center { margin:auto 0; min-height:0; overflow:hidden; }
.word { font-size:clamp(40px,12vw,72px); line-height:.92; font-weight:1000; letter-spacing:-.07em; overflow-wrap:anywhere; }
.ipa { margin-top:12px; font-size:clamp(16px,4.5vw,24px); line-height:1.25; font-weight:850; color:rgba(245,239,231,.72); font-family:Georgia,serif; overflow-wrap:anywhere; }
.meaning { font-size:clamp(24px,7vw,38px); line-height:1.14; font-weight:950; letter-spacing:-.04em; color:#fff3e4; overflow-wrap:anywhere; }
.hint { color:rgba(245,239,231,.55); font-size:12px; font-weight:850; flex:0 0 auto; }
.actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; width:min(100%,440px); flex:0 0 auto; }
.overlay { position:fixed; inset:0; z-index:20; background:rgba(6,9,14,.80); display:none; padding:calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 12px); }
.overlay.show { display:flex; }
.box {
  width:min(100%,560px); max-height:100%; margin:auto; background:#1c2432; border:1px solid var(--line);
  border-radius:26px; padding:14px; display:flex; flex-direction:column; gap:10px; box-shadow:0 25px 80px rgba(0,0,0,.45);
}
.boxTop { display:flex; align-items:center; justify-content:space-between; gap:10px; flex:0 0 auto; }
.results { overflow:auto; display:flex; flex-direction:column; gap:8px; padding-right:2px; }
.res { border:1px solid var(--line); background:rgba(255,255,255,.055); border-radius:17px; padding:12px; }
.res b { font-size:19px; }
.res small { color:var(--muted); font-weight:800; }
.toast {
  position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 16px); transform:translateX(-50%) translateY(16px);
  opacity:0; z-index:50; background:rgba(0,0,0,.78); border:1px solid var(--line);
  border-radius:999px; padding:11px 14px; font-weight:900; transition:.16s; max-width:92vw; text-align:center;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
@media(max-height:690px) {
  .app { gap:7px; padding-top:8px; }
  .panel { padding:8px; border-radius:20px; }
  .card { min-height:210px; padding:17px; border-radius:26px; }
  .title h1 { font-size:28px; }
  .btn { min-height:38px; padding:8px; font-size:13px; }
  .quick { gap:6px; margin-top:6px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="title">
      <h1>Kelime</h1>
      <p>eski stil · Android temiz sürüm</p>
    </div>
    <button class="iconBtn" id="menuBtn" aria-label="Menü">☰</button>
  </div>

  <section class="panel">
    <div class="row">
      <select id="source"></select>
      <div class="badge" id="level">Ana liste</div>
    </div>
    <div class="stats"><span>İlerleme: <b id="progressTxt">0/0</b></span><span>Sepet: <b id="basketTxt">0</b></span></div>
    <div class="bar"><i id="bar"></i></div>
    <div class="quick">
      <button class="btn" id="shuffleBtn">Karıştır</button>
      <button class="btn primary" id="basketBtn">Sepeti çöz</button>
      <button class="btn" id="testBtn">Yazma testi</button>
      <button class="btn" id="searchBtn">Ara</button>
    </div>
  </section>

  <main class="stage">
    <section class="card" id="card">
      <div class="meta"><span id="srcTxt">Kaynak</span><span id="noTxt">0/0</span></div>
      <div class="center" id="front">
        <div class="word" id="word">WORD</div>
        <div class="ipa" id="ipa">/IPA/</div>
        <button class="btn" id="speakBtn" style="margin-top:14px">🔊 Ses</button>
      </div>
      <div class="center" id="back" style="display:none">
        <div class="meaning" id="meaning">anlam</div>
      </div>
      <div class="hint" id="hint">dokun: anlam · sağ: bildim · sol: sepet</div>
    </section>
    <div class="actions">
      <button class="btn bad" id="badBtn">Sepete</button>
      <button class="btn primary" id="flipBtn">Anlam</button>
      <button class="btn good" id="goodBtn">Bildim</button>
    </div>
  </main>
</div>

<div class="overlay" id="menuBox">
  <div class="box">
    <div class="boxTop"><b>Menü</b><button class="iconBtn" id="closeMenu">×</button></div>
    <button class="btn" id="restartBtn">Bu listeyi başa al</button>
    <button class="btn bad" id="clearBtn">Sepeti temizle</button>
    <button class="btn bad" id="resetBtn">Tüm ilerlemeyi sıfırla</button>
    <p class="hint">Tek dosyadır. Dış script, CDN ve capacitor.js kullanmaz.</p>
  </div>
</div>

<div class="overlay" id="searchBox">
  <div class="box">
    <div class="boxTop"><b>Kelime ara</b><button class="iconBtn" id="closeSearch">×</button></div>
    <input id="q" placeholder="Kelime, IPA veya anlam yaz...">
    <div class="results" id="results"></div>
  </div>
</div>

<div class="overlay" id="testBox">
  <div class="box">
    <div class="boxTop"><b>Yazma testi</b><button class="iconBtn" id="closeTest">×</button></div>
    <div class="meaning" id="testMeaning" style="text-align:center;margin:24px 0">anlam</div>
    <input id="testInput" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="İngilizcesini yaz">
    <div id="testAnswer" class="hint" style="min-height:42px;text-align:center"></div>
    <div class="quick"><button class="btn bad" id="testSkip">Bilmiyorum</button><button class="btn good" id="testCheck">Kontrol</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

VIDENCE","word":"EVIDENCE","meaning":"kanıt; delil","ipa":"/ˈevɪdəns/","source":"ek liste"},{"id":"ek liste|86|EXPERIENCE","word":"EXPERIENCE","meaning":"deneyim; yaşamak","ipa":"/ɪkˈspɪriəns/","source":"ek liste"},{"id":"ek liste|87|FOCUS","word":"FOCUS","meaning":"odak; odaklanmak","ipa":"/ˈfoʊkəs/","source":"ek liste"},{"id":"ek liste|88|IMPROVE","word":"IMPROVE","meaning":"geliştirmek; iyileşmek","ipa":"/ɪmˈpruːv/","source":"ek liste"},{"id":"ek liste|89|INCREASE","word":"INCREASE","meaning":"artmak; artırmak","ipa":"/ɪnˈkriːs/","source":"ek liste"},{"id":"ek liste|90|INVOLVE","word":"INVOLVE","meaning":"içermek; dahil etmek","ipa":"/ɪnˈvɑːlv/","source":"ek liste"},{"id":"ek liste|91|NOTICE","word":"NOTICE","meaning":"fark etmek; bildirim","ipa":"/ˈnoʊtɪs/","source":"ek liste"},{"id":"ek liste|92|PREVENT","word":"PREVENT","meaning":"önlemek; engellemek","ipa":"/prɪˈvent/","source":"ek liste"},{"id":"ek liste|93|PROVIDE","word":"PROVIDE","meaning":"sağlamak; temin etmek","ipa":"/prəˈvaɪd/","source":"ek liste"},{"id":"ek liste|94|REQUIRE","word":"REQUIRE","meaning":"gerektirmek; ihtiyaç duymak","ipa":"/rɪˈkwaɪər/","source":"ek liste"},{"id":"ek liste|95|RESPOND","word":"RESPOND","meaning":"yanıt vermek; tepki vermek","ipa":"/rɪˈspɑːnd/","source":"ek liste"},{"id":"ek liste|96|RESULT","word":"RESULT","meaning":"sonuç; sonuçlanmak","ipa":"/rɪˈzʌlt/","source":"ek liste"},{"id":"ek liste|97|SEEK","word":"SEEK","meaning":"aramak; peşinde olmak","ipa":"/siːk/","source":"ek liste"},{"id":"ek liste|98|SUPPORT","word":"SUPPORT","meaning":"destek; desteklemek","ipa":"/səˈpɔːrt/","source":"ek liste"},{"id":"ek liste|99|TREAT","word":"TREAT","meaning":"davranmak; tedavi etmek","ipa":"/triːt/","source":"ek liste"},{"id":"ek liste|100|EXPLAIN","word":"EXPLAIN","meaning":"açıklamak; izah etmek","ipa":"/ɪkˈspleɪn/","source":"ek liste"},{"id":"ek liste|101|COMPARE","word":"COMPARE","meaning":"karşılaştırmak","ipa":"/kəmˈper/","source":"ek liste"},{"id":"ek liste|102|REDUCE","word":"REDUCE","meaning":"azaltmak; düşürmek","ipa":"/rɪˈduːs/","source":"ek liste"},{"id":"ek liste|103|REPLACE","word":"REPLACE","meaning":"yerine koymak; değiştirmek","ipa":"/rɪˈpleɪs/","source":"ek liste"},{"id":"ek liste|104|REMAIN","word":"REMAIN","meaning":"kalmak; sürmek","ipa":"/rɪˈmeɪn/","source":"ek liste"}];
var LS_KEY = 'ingilizce_android_temiz_v2';

var $ = function(id) { return document.getElementById(id); };
var els = {
  source:$('source'), level:$('level'), progress:$('progressTxt'), basket:$('basketTxt'), bar:$('bar'),
  card:$('card'), front:$('front'), back:$('back'), word:$('word'), ipa:$('ipa'), meaning:$('meaning'),
  src:$('srcTxt'), no:$('noTxt'), hint:$('hint'), toast:$('toast')
};

var state = loadState();
var list = [];
var idx = 0;
var flipped = false;
var downX = 0, downY = 0, downTime = 0;
var testCurrent = null;

function setVh() {
  document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
}
setVh();
window.addEventListener('resize', setVh);
window.addEventListener('orientationchange', function() { setTimeout(setVh, 250); });

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {done:{}, basket:{}}; }
  catch(e) { return {done:{}, basket:{}}; }
}
function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}
function toast(msg) {
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(function() { els.toast.classList.remove('show'); }, 1300);
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function norm(s) {
  return String(s || '').toLowerCase()
    .replace(/ı/g,'i').replace(/İ/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u')
    .replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/[^a-z0-9]+/g,'').trim();
}
function sources() {
  var seen = {}, out = ['Tümü'];
  WORDS.forEach(function(w) { if(!seen[w.source]) { seen[w.source]=1; out.push(w.source); } });
  out.push('Sepet');
  return out;
}
function setupSources() {
  els.source.innerHTML = '';
  sources().forEach(function(s) {
    var o = document.createElement('option');
    o.value = s; o.textContent = s;
    els.source.appendChild(o);
  });
}
function rebuild() {
  var selected = els.source.value || 'Tümü';
  if(selected === 'Sepet') {
    list = WORDS.filter(function(w) { return state.basket[w.id]; });
  } else if(selected === 'Tümü') {
    list = WORDS.filter(function(w) { return !state.done[w.id]; });
    if(!list.length) list = WORDS.slice();
  } else {
    list = WORDS.filter(function(w) { return w.source === selected && !state.done[w.id]; });
    if(!list.length) list = WORDS.filter(function(w) { return w.source === selected; });
  }
  idx = Math.min(idx, Math.max(0, list.length - 1));
  flipped = false;
  render();
}
function cur() { return list[idx] || null; }
function render() {
  var w = cur();
  var total = list.length;
  var basketCount = Object.keys(state.basket).length;
  els.basket.textContent = basketCount;
  els.progress.textContent = total ? (idx + 1) + '/' + total : '0/0';
  els.bar.style.width = total ? Math.round(((idx + 1) / total) * 100) + '%' : '0%';
  els.level.textContent = (els.source.value === 'Sepet') ? 'Sepet' : 'Ana liste';

  if(!w) {
    els.word.textContent = 'Bitti';
    els.ipa.textContent = '';
    els.meaning.textContent = (els.source.value === 'Sepet') ? 'Sepet boş.' : 'Bu listede kelime kalmadı.';
    els.src.textContent = 'Tamam';
    els.no.textContent = '0/0';
    showBack(true);
    return;
  }

  els.word.textContent = w.word;
  els.ipa.textContent = w.ipa || '';
  els.meaning.textContent = w.meaning;
  els.src.textContent = w.source || 'Liste';
  els.no.textContent = (idx + 1) + '/' + total;
  showBack(flipped);
}
function showBack(show) {
  flipped = !!show;
  els.front.style.display = flipped ? 'none' : 'block';
  els.back.style.display = flipped ? 'block' : 'none';
  els.hint.textContent = flipped ? 'sağ: bildim · sol: sepete' : 'dokun: anlam · sağ: bildim · sol: sepet';
}
function next() {
  if(!list.length) return;
  idx = (idx + 1) % list.length;
  flipped = false;
  render();
}
function good() {
  var w = cur(); if(!w) return;
  state.done[w.id] = Date.now();
  delete state.basket[w.id];
  saveState();
  rebuild();
  toast('Bildim ✅');
}
function bad() {
  var w = cur(); if(!w) return;
  state.basket[w.id] = Date.now();
  saveState();
  next();
  toast('Sepete atıldı');
}
function shake() {
  els.card.classList.remove('shake');
  void els.card.offsetWidth;
  els.card.classList.add('shake');
}
function shuffle() {
  for(var i=list.length-1; i>0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var t = list[i]; list[i] = list[j]; list[j] = t;
  }
  idx = 0; flipped = false; render(); toast('Karıştırıldı');
}
function speak(text) {
  try {
    if(window.AndroidTTS && typeof window.AndroidTTS.speak === 'function') {
      window.AndroidTTS.speak(text); return;
    }
  } catch(e) {}
  try {
    if(window.speechSynthesis) {
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = .88; u.pitch = 1;
      window.speechSynthesis.speak(u);
    }
  } catch(e) {}
}
function openBox(id) { $(id).classList.add('show'); }
function closeBox(id) { $(id).classList.remove('show'); }
function runSearch() {
  var q = norm($('q').value);
  var res = $('results');
  res.innerHTML = '';
  var found = WORDS.filter(function(w) {
    return !q || norm(w.word).indexOf(q) >= 0 || norm(w.meaning).indexOf(q) >= 0 || norm(w.ipa).indexOf(q) >= 0 || norm(w.source).indexOf(q) >= 0;
  }).slice(0,100);

  if(!found.length) {
    res.innerHTML = '<div class="hint">Sonuç yok.</div>';
    return;
  }

  found.forEach(function(w) {
    var d = document.createElement('div');
    d.className = 'res';
    d.innerHTML = '<b>' + esc(w.word) + '</b><br><small>' + esc(w.ipa || '') + ' · ' + esc(w.source || '') + '</small><div style="margin-top:6px;color:#fff3e4;font-weight:850">' + esc(w.meaning) + '</div>';
    d.onclick = function() { speak(w.word); };
    res.appendChild(d);
  });
}
function startTest() {
  testCurrent = WORDS[Math.floor(Math.random()*WORDS.length)];
  $('testMeaning').textContent = testCurrent.meaning;
  $('testInput').value = '';
  $('testAnswer').textContent = '';
  openBox('testBox');
  setTimeout(function() { try { $('testInput').focus(); } catch(e) {} }, 150);
}
function checkTest(skip) {
  if(!testCurrent) return;
  if(skip) {
    $('testAnswer').innerHTML = 'Cevap: <b>' + esc(testCurrent.word) + '</b>';
    speak(testCurrent.word);
    setTimeout(startTest, 900);
    return;
  }
  var ans = norm($('testInput').value);
  var real = norm(testCurrent.word);
  if(ans === real) {
    $('testAnswer').textContent = 'Doğru ✅';
    speak(testCurrent.word);
    setTimeout(startTest, 700);
  } else {
    $('testAnswer').innerHTML = 'Yanlış. Cevap: <b>' + esc(testCurrent.word) + '</b>';
    shake();
    speak(testCurrent.word);
  }
}

setupSources();
rebuild();

els.source.onchange = rebuild;
$('flipBtn').onclick = function() { showBack(!flipped); };
$('goodBtn').onclick = good;
$('badBtn').onclick = bad;
$('shuffleBtn').onclick = shuffle;
$('basketBtn').onclick = function() { els.source.value = 'Sepet'; idx = 0; rebuild(); };
$('speakBtn').onclick = function(e) { e.stopPropagation(); var w = cur(); if(w) speak(w.word); };
$('menuBtn').onclick = function() { openBox('menuBox'); };
$('closeMenu').onclick = function() { closeBox('menuBox'); };
$('searchBtn').onclick = function() { openBox('searchBox'); runSearch(); setTimeout(function() { try { $('q').focus(); } catch(e) {} }, 150); };
$('closeSearch').onclick = function() { closeBox('searchBox'); };
$('q').oninput = runSearch;
$('testBtn').onclick = startTest;
$('closeTest').onclick = function() { closeBox('testBox'); };
$('testCheck').onclick = function() { checkTest(false); };
$('testSkip').onclick = function() { checkTest(true); };
$('testInput').addEventListener('keydown', function(e) { if(e.key === 'Enter') checkTest(false); });
$('restartBtn').onclick = function() {
  var selected = els.source.value || 'Tümü';
  if(confirm('Bu liste başa alınsın mı?')) {
    WORDS.forEach(function(w) { if(selected === 'Tümü' || selected === 'Sepet' || w.source === selected) delete state.done[w.id]; });
    saveState(); rebuild(); closeBox('menuBox'); toast('Başa alındı');
  }
};
$('clearBtn').onclick = function() { state.basket = {}; saveState(); rebuild(); toast('Sepet temizlendi'); };
$('resetBtn').onclick = function() {
  if(confirm('Tüm ilerleme silinsin mi?')) {
    state = {done:{}, basket:{}};
    saveState(); idx = 0; rebuild(); closeBox('menuBox'); toast('Sıfırlandı');
  }
};

els.card.addEventListener('pointerdown', function(e) {
  downX = e.clientX; downY = e.clientY; downTime = Date.now();
}, {passive:true});
els.card.addEventListener('pointerup', function(e) {
  var dx = e.clientX - downX;
  var dy = e.clientY - downY;
  if(Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) && Date.now() - downTime < 900) {
    if(dx > 0) good(); else bad();
    return;
  }
  if(Math.abs(dx) < 10 && Math.abs(dy) < 10) showBack(!flipped);
}, {passive:true});

document.addEventListener('keydown', function(e) {
  if(e.key === 'ArrowRight') good();
  if(e.key === 'ArrowLeft') bad();
  if(e.key === ' ') { e.preventDefault(); showBack(!flipped); }
});

})();
</script>
</body>
</html>
