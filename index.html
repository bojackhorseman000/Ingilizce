<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kelime Kartları · Tarayıcı Test</title>
<style>
:root {
  --bg:#0f1724; --bg2:#172233; --panel:rgba(255,255,255,.075); --panel2:rgba(255,255,255,.105);
  --card:#202b3e; --card2:#263249; --text:#f5efe7; --muted:#b9b1bd; --line:rgba(255,255,255,.12);
  --accent:#efd99b; --good:#aee6ca; --bad:#efa9a3; --shadow:0 28px 80px rgba(0,0,0,.38);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 12% 0%,#28364a 0,#101826 38%,#0a0f18 100%);color:var(--text);overflow-x:hidden}
body{padding:22px 16px calc(28px + env(safe-area-inset-bottom));}
.app{max-width:720px;margin:0 auto}
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin:4px 0 18px}
h1{margin:0;font-size:34px;line-height:1;font-weight:900;letter-spacing:-.05em}
.sub{margin-top:8px;color:var(--muted);font-weight:800;font-size:15px}
.icon{width:54px;height:54px;border-radius:24px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:25px;font-weight:900;display:grid;place-items:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.045));border-radius:28px;padding:14px;box-shadow:var(--shadow);backdrop-filter:blur(14px);margin-bottom:18px}
.row{display:flex;gap:10px;align-items:center}
select,button,input{font:inherit}
select{width:100%;height:54px;border-radius:22px;border:1px solid var(--line);background:#1d2738;color:var(--text);padding:0 18px;font-weight:900;outline:none}
button{border:0;min-height:50px;border-radius:20px;background:var(--panel2);color:var(--text);font-weight:900;padding:0 16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
button:disabled{opacity:.42}
.primary{background:linear-gradient(180deg,#efe4cf,#d9cfbd);color:#222}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stats{display:flex;justify-content:space-between;color:var(--muted);font-weight:900;margin:13px 2px 10px;font-size:14px}
.bar{height:9px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),rgba(174,230,202,.95));border-radius:99px;transition:width .25s}
.path{margin-top:10px;color:var(--accent);font-weight:900;font-size:13px;min-height:18px}
.stage{position:relative;min-height:min(58vh,560px);display:grid;place-items:center;margin-top:16px}
.card{width:min(100%,560px);height:min(58vh,560px);min-height:430px;border-radius:34px;border:1px solid var(--line);background:linear-gradient(145deg,#263249,#1d2738 62%,#1b2b33);box-shadow:var(--shadow);position:relative;touch-action:none;user-select:none;overflow:hidden;transition:transform .18s ease, opacity .18s ease}
.card:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 20% 8%,rgba(255,255,255,.08),transparent 32%),radial-gradient(circle at 80% 90%,rgba(174,230,202,.08),transparent 35%);pointer-events:none}
.face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:72px 28px 48px;transition:opacity .16s, transform .16s}
.back{opacity:0;transform:scale(.985);pointer-events:none}
.card.flipped .front{opacity:0;transform:scale(.985);pointer-events:none}
.card.flipped .back{opacity:1;transform:scale(1);pointer-events:auto}
.word{font-size:clamp(42px,10vw,74px);font-weight:1000;letter-spacing:-.06em;text-wrap:balance;line-height:.95;text-shadow:0 8px 28px rgba(0,0,0,.25)}
.ipa{margin-top:18px;color:var(--muted);font-family:Georgia,serif;font-weight:900;font-size:clamp(22px,5vw,34px)}
.meaning{font-size:clamp(28px,7vw,50px);font-weight:950;letter-spacing:-.04em;line-height:1.1;text-wrap:balance}
.meta{position:absolute;top:28px;left:26px;right:94px;display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-weight:900;font-size:14px;text-align:left}
.hint{position:absolute;bottom:28px;left:20px;right:20px;text-align:center;color:var(--muted);font-weight:900}
.star{position:absolute;top:22px;right:22px;z-index:3;width:62px;height:62px;border-radius:25px;font-size:34px;color:var(--text)}
.star.on{color:var(--accent)}
.sound{margin-top:28px;width:64px;height:64px;border-radius:27px;font-size:26px}
.empty{padding:34px;text-align:center}
.empty h2{margin:0 0 10px;font-size:34px;letter-spacing:-.04em}
.empty p{margin:0 0 22px;color:var(--muted);font-weight:800}
.footer{display:flex;justify-content:space-between;gap:12px;margin-top:10px;color:var(--muted);font-weight:900;padding:0 4px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:#efe4cf;color:#222;border-radius:999px;padding:12px 18px;font-weight:950;box-shadow:var(--shadow);transition:.18s;z-index:20;max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal{position:fixed;inset:0;background:rgba(4,8,13,.62);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:18px;z-index:10}
.modal.show{display:flex}
.box{width:min(680px,100%);max-height:86vh;overflow:auto;border-radius:28px;border:1px solid var(--line);background:linear-gradient(180deg,#1b2536,#121b2a);box-shadow:var(--shadow);padding:18px}
.boxHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.box h2{margin:0;font-size:28px;letter-spacing:-.04em}
.searchInput{width:100%;height:56px;border-radius:22px;border:1px solid var(--line);background:#202b3e;color:var(--text);font-weight:850;padding:0 16px;outline:none}
.result{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:22px;padding:14px;margin-top:10px}
.rword{font-size:22px;font-weight:1000}
.ripa{color:var(--muted);font-family:Georgia,serif;font-weight:900;text-align:right}
.rmean{grid-column:1/-1;color:var(--text);font-weight:800}
.rsrc{grid-column:1/-1;color:var(--muted);font-weight:900;font-size:13px}
.rstar{width:48px;height:48px;border-radius:18px;font-size:26px;color:var(--accent)}
.testPanel{display:none}
.testPanel.show{display:block}
.testCard{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:26px;padding:18px;margin-top:12px}
.answer{display:none;margin-top:12px;color:var(--accent);font-weight:950;line-height:1.35}
.answer.show{display:block}
.testMeaning{font-size:24px;font-weight:950;line-height:1.2;margin:12px 0 16px}
.testInput{width:100%;height:56px;border-radius:20px;border:1px solid var(--line);background:#202b3e;color:var(--text);font-weight:900;padding:0 16px;outline:none}
.testActions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
@media(max-width:520px){body{padding:18px 12px calc(24px + env(safe-area-inset-bottom))}h1{font-size:31px}.panel{border-radius:26px;padding:12px}.grid{grid-template-columns:1fr 1fr}button{min-height:48px;border-radius:18px;padding:0 12px}.stage{min-height:53vh}.card{height:53vh;min-height:390px;border-radius:30px}.face{padding:68px 20px 44px}.word{font-size:clamp(38px,12vw,60px)}.meaning{font-size:clamp(25px,8vw,42px)}.star{width:56px;height:56px}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>Kelime Kartları</h1><div class="sub" id="sub">dokun: anlam · sağ: bildim · sol: sepet</div></div>
    <button class="icon" id="menuBtn">☰</button>
  </div>
  <div class="panel">
    <div class="row"><select id="source"></select><button class="primary" id="layerBtn">Ana liste</button></div>
    <div class="path" id="path"></div>
    <div class="stats"><span id="progress">0/0</span><span id="basket">Yeni sepet: 0</span></div>
    <div class="bar"><i id="bar"></i></div>
    <div class="grid">
      <button id="shuffle">Karıştır</button><button id="solve">Sepeti çöz</button>
      <button id="testBtn">Yazma testi</button><button id="searchBtn">Ara</button>
    </div>
  </div>
  <section class="testPanel" id="testPanel">
    <div class="panel">
      <div class="row"><button id="exitTest">Kartlara dön</button><button id="testStar">☆</button></div>
      <div class="testCard">
        <div class="meta" style="position:static;margin-bottom:8px"><span id="testSrc"></span><span id="testNo"></span></div>
        <div class="testMeaning" id="testMeaning"></div>
        <div class="testActions">
          <button id="skip">Bilmiyorum</button><button id="check" class="primary">Kontrol</button><button id="nextTest" disabled>Geç</button>
        </div>
        <input id="testInput" class="testInput" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="İngilizcesini yaz">
        <div class="answer" id="answer"></div>
      </div>
    </div>
  </section>
  <div class="stage" id="stage">
    <div class="card" id="card">
      <button class="star" id="star">☆</button>
      <div class="face front">
        <div class="meta"><span id="frontSrc">Kaynak</span><span id="frontNo">0/0</span></div>
        <div class="word" id="word">WORD</div>
        <div class="ipa" id="ipa">/IPA/</div>
        <button class="sound" id="sound">🔊</button>
        <div class="hint">dokununca anlam</div>
      </div>
      <div class="face back">
        <div class="meta"><span id="backSrc">Kaynak</span><span id="backNo">0/0</span></div>
        <div class="meaning" id="meaning">Anlam</div>
        <div class="hint">tekrar dokununca kelime</div>
      </div>
    </div>
    <div class="empty" id="empty" style="display:none"><h2 id="emptyTitle">Liste bitti</h2><p id="emptyText">Bu listedeki kartlar tamamlandı.</p><button id="emptySolve" class="primary">Sepeti çöz</button></div>
  </div>
  <div class="footer"><span>← sepete at</span><span>sağa: bildim →</span></div>
</div>
<div class="modal" id="searchModal"><div class="box"><div class="boxHead"><h2>Kelime ara</h2><button id="closeSearch">×</button></div><input id="searchInput" class="searchInput" placeholder="kelime, IPA veya anlam"><div class="sub" id="searchInfo" style="margin:12px 4px"></div><div id="results"></div></div></div>
<div class="modal" id="menuModal"><div class="box"><div class="boxHead"><h2>Menü</h2><button id="closeMenu">×</button></div><div class="grid"><button id="prevLayer">← Üst liste</button><button id="nextLayer">Alt liste →</button><button id="clearBasket">Bu turun sepetini sil</button><button id="deleteLayer">Bu sepet listesini sil</button><button id="restartLayer">Bu listeyi baştan çöz</button><button id="resetSource">Bu kaynağı sıfırla</button><button id="exportData">Yedek indir</button><button id="resetAll">Tüm veriyi sıfırla</button></div></div></div>
